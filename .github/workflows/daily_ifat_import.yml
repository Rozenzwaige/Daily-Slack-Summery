name: Daily Ifat Import

on:
  schedule:
    # 07:00 IDT (UTC+3) = 04:00 UTC
    - cron: "0 4 * * *"
    # 19:00 IDT (UTC+3) = 16:00 UTC
    - cron: "0 16 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch-ifat:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        working-directory: ifatPub
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Write Google credentials
        working-directory: ifatPub
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        shell: powershell
        run: '[System.IO.File]::WriteAllText("credentials.json", $env:GOOGLE_CREDENTIALS_JSON)'

      - name: Write Ifat config
        working-directory: ifatPub
        env:
          IFAT_CONFIG_JSON: ${{ secrets.IFAT_CONFIG_JSON }}
        shell: powershell
        run: '[System.IO.File]::WriteAllText("ifat_config.json", $env:IFAT_CONFIG_JSON)'

      - name: Fetch Ifat articles → Google Sheets
        working-directory: ifatPub
        run: python ifat_processor.py --fetch-api
