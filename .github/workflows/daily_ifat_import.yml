name: Daily Ifat Import

on:
  schedule:
    # 07:00 IDT (UTC+3) = 04:00 UTC
    - cron: "0 4 * * *"
    # 19:00 IDT (UTC+3) = 16:00 UTC
    - cron: "0 16 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch-ifat:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ifatPub/requirements.txt

      - name: Install Python dependencies
        working-directory: ifatPub
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Write Google credentials
        working-directory: ifatPub
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json

      - name: Write Ifat config
        working-directory: ifatPub
        env:
          IFAT_CONFIG_JSON: ${{ secrets.IFAT_CONFIG_JSON }}
        run: echo "$IFAT_CONFIG_JSON" > ifat_config.json

      - name: Fetch Ifat articles → Google Sheets
        working-directory: ifatPub
        run: python ifat_processor.py --fetch-api
