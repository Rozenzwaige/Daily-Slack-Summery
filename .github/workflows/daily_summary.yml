name: Daily Slack Summary

on:
  schedule:
    - cron: "0 5 * * 0,1,2,3,4"
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Check if already sent today (scheduled runs only)
        if: github.event_name == 'schedule'
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          ALREADY=$(gh run list \
            --workflow=daily_summary.yml \
            --json createdAt,event,status \
            --limit 20 \
            | jq -r --arg d "$TODAY" \
              '[.[] | select(.event == "workflow_dispatch" and (.createdAt | startswith($d)))] | length > 0')
          echo "skip=$ALREADY" >> $GITHUB_OUTPUT
          if [ "$ALREADY" = "true" ]; then
            echo "נמצאה הפעלה ידנית היום (בכל סטטוס) — מדלג על השליחה."
          fi

      - name: Checkout repository
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ifatPub/requirements_slack.txt

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        working-directory: ifatPub
        run: pip install -r requirements_slack.txt

      - name: Send Slack summary
        if: steps.guard.outputs.skip != 'true'
        working-directory: ifatPub
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: python slack_summary.py
