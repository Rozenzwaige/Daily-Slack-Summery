name: Daily Slack Summary

on:
  schedule:
    # 04:00 UTC = 07:00 IDT (Israel Daylight Time, UTC+3)
    # Sunday–Thursday only. GitHub cron may arrive up to ~30 min late.
    - cron: "0 4 * * 0,1,2,3,4"
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Skip if already ran successfully today
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "▶️  Manual trigger — running."
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          ALREADY=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "daily_summary.yml" \
            --status success \
            --json createdAt \
            --limit 10 | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          today = '$TODAY'
          found = any(r['createdAt'][:10] == today for r in runs)
          print('true' if found else 'false')
          ")

          if [ "$ALREADY" = "true" ]; then
            echo "✋ Already ran successfully today — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "▶️  Running."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ifatPub/requirements_slack.txt

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        working-directory: ifatPub
        run: pip install -r requirements_slack.txt

      - name: Send Slack summary
        if: steps.guard.outputs.skip != 'true'
        working-directory: ifatPub
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: python slack_summary.py
