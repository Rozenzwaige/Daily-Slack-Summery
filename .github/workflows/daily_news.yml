name: Daily News Summary

on:
  schedule:
    # 10:00 Israel Daylight Time (IDT = UTC+3)  → 07:00 UTC  (summer: Mar–Oct)
    # 10:00 Israel Standard Time (IST = UTC+2)  → 08:00 UTC  (winter: Oct–Mar)
    # Using 07:00 UTC so it arrives at 10:00 during the main working season.
    - cron: "0 7 * * *"

  # Allow triggering manually from the GitHub Actions UI (for testing)
  workflow_dispatch:

jobs:
  send-news-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: news_summary/requirements.txt

      - name: Install dependencies
        run: pip install -r news_summary/requirements.txt

      - name: Run daily news summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python news_summary/main.py
