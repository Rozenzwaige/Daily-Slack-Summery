name: Daily News Summary

on:
  schedule:
    # FALLBACK ONLY — cron-job.org is the primary trigger at 06:00 UTC (09:00 IDT).
    # This runs at 08:00 UTC (11:00 IDT) as a safety net if cron-job.org fails.
    # Duplicate prevention in the check job will skip this if already ran today.
    - cron: "0 8 * * *"

  # Allow triggering manually from the GitHub Actions UI
  workflow_dispatch:

jobs:
  # ── Job 1: decide whether to run ──────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}

    steps:
      - name: Decide whether to run
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manual triggers (workflow_dispatch) always run
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "▶️  Manual trigger — running."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Scheduled run: skip if a manual run already succeeded today
          TODAY=$(date -u +%Y-%m-%d)
          ALREADY=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "daily_news.yml" \
            --event workflow_dispatch \
            --status success \
            --json createdAt \
            --limit 10 | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          today = '$TODAY'
          found = any(r['createdAt'][:10] == today for r in runs)
          print('true' if found else 'false')
          ")

          if [ "$ALREADY" = "true" ]; then
            echo "✋ Manual run already completed today — skipping scheduled run."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "▶️  No manual run today — proceeding with scheduled run."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: run the summary (only if check approved it) ────────────────────
  send-news-summary:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: news_summary/requirements.txt

      - name: Install dependencies
        run: pip install -r news_summary/requirements.txt

      - name: Run daily news summary
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          NEWS_INPUTS_CHANNEL: ${{ secrets.NEWS_INPUTS_CHANNEL }}
        run: python news_summary/main.py
