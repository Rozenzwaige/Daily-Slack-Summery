name: Daily News Summary

on:
  schedule:
    # 05:00 UTC = 08:00 IDT (Israel Daylight Time, UTC+3)
    # Sunday–Thursday only. GitHub cron may arrive up to ~30 min late.
    - cron: "0 5 * * 0,1,2,3,4"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  send-news-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Skip if already ran successfully today
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "▶️  Manual trigger — running."
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          ALREADY=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "daily_news.yml" \
            --status success \
            --json createdAt \
            --limit 10 | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          today = '$TODAY'
          found = any(r['createdAt'][:10] == today for r in runs)
          print('true' if found else 'false')
          ")

          if [ "$ALREADY" = "true" ]; then
            echo "✋ Already ran successfully today — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "▶️  Running."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: news_summary/requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r news_summary/requirements.txt

      - name: Restore seen-articles cache
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: news_summary/seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: Run daily news summary
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN:      ${{ secrets.SLACK_BOT_TOKEN }}
          NEWS_INPUTS_CHANNEL:  ${{ secrets.NEWS_INPUTS_CHANNEL }}
        run: python news_summary/main.py
